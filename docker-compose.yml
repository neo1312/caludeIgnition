version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ignition-postgres
    restart: always
    environment:
      POSTGRES_USER: ignition
      POSTGRES_PASSWORD: ignition
      POSTGRES_DB: ignition
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ignition-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition"]
      interval: 10s
      timeout: 5s
      retries: 5

  ignition:
    image: inductiveautomation/ignition:8.3
    container_name: ignition-gateway
    restart: always
    user: "1000:1000"
    ports:
      - "8088:8088"
      - "8043:8043"
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: password
    volumes:
      - ignition-data:/usr/local/bin/ignition/data
      - ./ignition-projects:/usr/local/bin/ignition/data/projects
      - ./ignition-config:/usr/local/bin/ignition/data/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ignition-net

volumes:
  postgres-data:
  ignition-data:

networks:
  ignition-net:
    driver: bridge
